{{- if .Values.configureAdmissionController }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- include "admissionController.annotations" . | nindent 4 }}
  labels:
    {{- include "admissionController.labels" . | nindent 4 }}
  name: {{ .Values.admissionController.resourceNamePrefix }}-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  - v1beta1
  clientConfig:
    {{- if .Values.admissionController.webhookUrl }}
    url: {{ .Values.admissionController.webhookUrl }}
    {{- else }}
    service:
      name: {{ .Values.admissionController.webhookServiceName }}
      namespace: {{ .Release.Namespace }}
      path: /v1/admit
    {{- end }}
  failurePolicy: {{ .Values.admissionController.webhookFailurePolicy }}
  {{- if ge (int .Capabilities.KubeVersion.Minor) 28 }}
  matchConditions: {{ toYaml .Values.admissionController.webhookMatchConditions | nindent 4 }}
  {{- end }}
  matchPolicy: Exact
  name: validation.tenable.com
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - {{ .Release.Namespace }}
  sideEffects: None
  timeoutSeconds: {{ .Values.admissionController.webhookTimeoutSeconds }}
  {{- end }}