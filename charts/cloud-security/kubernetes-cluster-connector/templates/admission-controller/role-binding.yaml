{{- if and .Values.configureAdmissionController (not .Values.admissionController.webhookUrl) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    {{- include "admissionController.annotations" . | nindent 4 }}
  labels:
    {{- include "admissionController.labels" . | nindent 4 }}
  name: {{ include "admissionController.globalResourceName" (dict "name" "rb" "root" .) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "admissionController.globalResourceName" (dict "name" "r" "root" .) }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.admissionController.resourceNamePrefix }}-service-account
  namespace: {{ .Release.Namespace }}
{{- end }}