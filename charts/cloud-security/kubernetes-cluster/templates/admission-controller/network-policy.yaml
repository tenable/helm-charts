{{- if .Values.admissionController.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  annotations:
    {{- include "annotations" . | nindent 4 }}
  labels:
    {{- include "labels" . | nindent 4 }}
    {{- include "admissionController.labels" . | nindent 4 }}
  name: {{ include "admissionController.resourceNamePrefix" . }}-network-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      {{- include "admissionController.labels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- with .Values.admissionController.networkPolicy.ingress.from }}
    - from:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.admissionController.webhook.port }}  
{{- end }}